* { margin:0; padding:0; box-sizing:border-box; }

.container { max-width:1500px; margin:0 auto; padding:20px; }
.card { background:#fff; border-radius:10px; padding:16px; margin-bottom:20px; box-shadow:0 1px 3px rgba(0,0,0,.08); }

.metric .value { font-size:24px; font-weight:700; color:#1677ff; }
.metric .label { font-size:11px; color:#888; margin-top:2px; }

.btn-outline { background:#fff; border:1px solid #ddd !important; }

tr:hover td { background:#f8f9ff; }
.nav-up { color:#e74c3c; font-weight:600; }
.nav-down { color:#27ae60; }
.tag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; font-weight:600; }
.tag.up { background:#fff2f0; color:#e74c3c; }
.tag.down { background:#f6ffed; color:#27ae60; }
.hint { font-size:11px; color:#999; margin-top:4px; }
.rank-bar { display:inline-block; height:6px; border-radius:3px; background:#1677ff; vertical-align:middle; margin-right:4px; }

</head>
<body>

<div class="header">
  <h1>📊 量化私募周度累计净值看板</h1>
  <p>数据来源: 点睛业绩放送 · 2026年1月~5月 · 基于今年以来YTD收益率计算 · 年初净值=1.0000</p>
</div>

<div class="container">

  <div class="metrics">
    <div class="metric"><div class="value" id="totalFunds">-</div><div class="label">基金总数</div></div>
    <div class="metric"><div class="value" id="avgNav">-</div><div class="label">平均累计净值</div></div>
    <div class="metric"><div class="value" id="bestNav">-</div><div class="label">最高累计净值</div></div>
    <div class="metric"><div class="value" id="upPct">-</div><div class="label">正收益占比</div></div>
    <div class="metric"><div class="value" id="dataWeeks">-</div><div class="label">数据周数</div></div>
  </div>

  <!-- 1. Strategy averages -->
  <div class="card">
    <h3>📈 各策略平均累计净值走势</h3>
    <div class="chart" id="chartStrategy"></div>
  </div>

  <!-- 2. Grid: all products for a strategy + size -->
  <div class="card">
    <div class="toolbar">
      <h3 style="border:none;margin:0;">📉 同策略产品净值对比</h3>
      <div>
        <select id="gridStrategy"><option value="">选择策略...</option></select>
        <select id="gridSize"><option value="all">全部规模</option></select>
        <span class="hint" id="gridCount"></span>
      </div>
    </div>
    <div class="chart tall" id="chartGrid"></div>
  </div>

  <!-- 5. Weekly return ranking (NEW) -->
  <div class="card">
    <div class="toolbar">
      <h3 style="border:none;margin:0;">📋 周度收益排名</h3>
      <div>
        <select id="wrWeek"></select>
        <select id="wrStrategy"><option value="all">全部策略</option></select>
        <select id="wrSize"><option value="all">全部规模</option></select>
        <span class="hint" id="wrCount"></span>
      </div>
    </div>
    <div style="overflow-x:auto;max-height:550px;overflow-y:auto;">
      <table id="tableWR"><thead></thead><tbody></tbody></table>
    </div>
  </div>

  
  <!-- YTD ranking -->
  <div class="card">
    <div class="toolbar">
      <h3 style="border:none;margin:0;">📅 今年以来收益排名（年初=1.0000）</h3>
      <div>
        <select id="ytdStrategy"><option value="all">全部策略</option></select>
        <select id="ytdSize"><option value="all">全部规模</option></select>
        <span class="hint" id="ytdCount"></span>
      </div>
    </div>
    <div style="overflow-x:auto;max-height:550px;overflow-y:auto;">
      <table id="tableYTD"><thead></thead><tbody></tbody></table>
    </div>
  </div>

<!-- 3. Single fund -->
  <div class="card">
    <div class="toolbar">
      <h3 style="border:none;margin:0;">🔍 单基金净值曲线</h3>
      <div>
        <select id="filterStrategy"><option value="all">全部策略</option></select>
        <select id="pickerFund" style="width:280px;"></select>
        <button class="btn-primary" onclick="addLine()">+ 叠加</button>
        <button class="btn-outline" onclick="clearLines()">清除</button>
      </div>
    </div>
    <div class="chart" id="chartFund"></div>
  </div>

  <!-- 4. Ranking -->
  <div class="card">
    <div class="toolbar">
      <h3 style="border:none;margin:0;">🏆 累计净值排名</h3>
      <div>
        <select id="filterRankStrategy"><option value="all">全部策略</option></select>
        <input type="text" id="searchRank" placeholder="搜索管理人..." style="width:180px;">
      </div>
    </div>
    <div style="overflow-x:auto;max-height:600px;overflow-y:auto;">
      <table id="tableRank"><thead></thead><tbody></tbody></table>
    </div>
  </div>

</div>

function drawGridChart(){
  var strat=document.getElementById('gridStrategy').value;
  var size=document.getElementById('gridSize').value;

    series.push({name:name+'('+strat+')',type:'line',data:d,smooth:true,symbol:'circle',symbolSize:5,lineStyle:{width:3,color:COLORS[i%COLORS.length]}});
  });
  cF.setOption({tooltip:{trigger:'axis'},legend:{bottom:0,type:'scroll'},grid:{left:50,right:30,top:20,bottom:40},xAxis:{type:'category',data:dates,axisLabel:{rotate:45,fontSize:10},boundaryGap:false},yAxis:{type:'value',scale:true,axisLabel:{formatter:function(v){return v.toFixed(3);}}},series:series},true);
}
window.addEventListener('resize',function(){cF.resize();});

// ── 4. Cumulative NAV ranking table ──
function updateRankTable(){
  var strat=document.getElementById('filterRankStrategy').value;
  var search=document.getElementById('searchRank').value.toLowerCase();
  var funds=DATA.funds.filter(function(f){return strat==='all'||f.strategy===strat;}).filter(function(f){return !search||f.company.toLowerCase().indexOf(search)>=0;}).map(function(f){var v=f.navs.filter(function(n){return n!==null;});return{company:f.company,strategy:f.strategy,navs:f.navs,size:f.size,final:v.length?v[v.length-1]:null,first:v.length?v[0]:null,weeks:v.length};}).filter(function(f){return f.final!==null;}).sort(function(a,b){return b.final-a.final;});
  var thead='<tr><th>排名</th><th>管理人</th><th>策略</th><th>规模</th><th>最新净值</th><th>变动</th><th>覆盖</th>';
  dates.forEach(function(d){thead+='<th>'+d+'</th>';});
  thead+='</tr>';
  document.querySelector('#tableRank thead').innerHTML=thead;
  var tbody='';
  funds.slice(0,100).forEach(function(f,i){
    var ch=f.final!==null&&f.first!==null?f.final-f.first:null;
    var chHtml='-';
    if(ch!==null){var cls=ch>0?'up':'down';chHtml='<span class="tag '+cls+'">'+(ch>=0?'+':'')+(ch*100).toFixed(1)+'%</span>';}
    tbody+='<tr><td><b>'+(i+1)+'</b></td><td>'+f.company+'</td><td>'+f.strategy+'</td><td>'+f.size+'</td><td class="'+(f.final>=1?'nav-up':'nav-down')+'">'+f.final.toFixed(4)+'</td><td>'+chHtml+'</td><td>'+f.weeks+'/'+dates.length+'</td>';
    dates.forEach(function(d,j){var n=f.navs[j];tbody+=n!==null?'<td style="color:'+(n>=1?'#e74c3c':'#27ae60')+'">'+n.toFixed(4)+'</td>':'<td style="color:#ccc">·</td>';});
    tbody+='</tr>';
  });
  document.querySelector('#tableRank tbody').innerHTML=tbody;
}

// ── 5. Weekly return ranking (NEW) ──
var wrWeekSel = document.getElementById('wrWeek');
DATA.weekLabels.forEach(function(wl){
  var info = DATA.weekInfo[wl] || wl;
  wrWeekSel.innerHTML += '<option value="'+wl+'">'+wl+' ('+info+')</option>';
});
// Default to last week
wrWeekSel.value = DATA.weekLabels[DATA.weekLabels.length-1];

// Update size dropdown when strategy changes
document.getElementById('wrStrategy').addEventListener('change', function(){
  var strat = this.value;
  var sel = document.getElementById('wrSize');
  sel.innerHTML = '<option value="all">全部规模</option>';
  if(strat !== 'all' && DATA.strategySizes[strat]) {
    DATA.strategySizes[strat].forEach(function(sz){ sel.innerHTML += '<option value="'+sz+'">'+sz+'</option>'; });
  } else if (strat === 'all') {
    SIZE_ORDER.forEach(function(sz){ sel.innerHTML += '<option value="'+sz+'">'+sz+'</option>'; });
  }
  updateWRTable();
});

function updateWRTable() {
  var week = document.getElementById('wrWeek').value;
  var strat = document.getElementById('wrStrategy').value;
  var size = document.getElementById('wrSize').value;
  var countEl = document.getElementById('wrCount');

  var data = DATA.weeklyData[week] || [];
  
  // Filter
  var filtered = data.filter(function(r){
    if (strat !== 'all' && r.strategy !== strat) return false;
    if (size !== 'all' && r.size !== size) return false;
    return true;
  });

  // Compute percentile within filtered set
  var n = filtered.length;
  filtered.sort(function(a,b){ return b.weekly_return - a.weekly_return; });
  filtered.forEach(function(r, i){
    r.pct = n > 1 ? ((n - i) / n * 100).toFixed(0) : 100;
  });

  countEl.textContent = filtered.length + ' 条';

  // Find the max abs return for bar scaling
  var maxAbs = 0;
  filtered.forEach(function(r){ maxAbs = Math.max(maxAbs, Math.abs(r.weekly_return)); });

  var thead = '<tr><th>排名</th><th>管理人</th><th>策略</th><th>规模</th><th>周收益</th><th>收益柱</th><th>分位</th></tr>';
  document.querySelector('#tableWR thead').innerHTML = thead;

  var tbody = '';
  filtered.forEach(function(r, i){
    var retPct = (r.weekly_return * 100).toFixed(2);
    var isUp = r.weekly_return >= 0;
    var cls = isUp ? 'nav-up' : 'nav-down';
    // Bar width proportional to return
    var barW = maxAbs > 0 ? Math.abs(r.weekly_return) / maxAbs * 100 : 0;
    var barColor = isUp ? '#e74c3c' : '#27ae60';
    var barHtml = '<span style="display:inline-block;width:'+barW+'%;height:12px;background:'+barColor+';border-radius:3px;vertical-align:middle;"></span>';

    tbody += '<tr>';
    tbody += '<td><b>'+(i+1)+'</b></td>';
    tbody += '<td>'+r.company+'</td>';
    tbody += '<td>'+r.strategy+'</td>';
    tbody += '<td>'+r.size+'</td>';
    tbody += '<td class="'+cls+'">'+(isUp?'+':'')+retPct+'%</td>';
    tbody += '<td style="width:180px;">'+barHtml+'</td>';
    tbody += '<td>'+r.pct+'%</td>';
    tbody += '</tr>';
  });

  document.querySelector('#tableWR tbody').innerHTML = tbody;
}

document.getElementById('ytdStrategy').addEventListener('change', function(){

  sel.innerHTML = '<option value="all">全部规模</option>';
  if(strat !== 'all' && DATA.strategySizes[strat]) {
    DATA.strategySizes[strat].forEach(function(sz){ sel.innerHTML += '<option value="'+sz+'">'+sz+'</option>'; });
  }
  updateYTDTable();

document.getElementById('ytdSize').addEventListener('change', updateYTDTable);

function updateYTDTable() {
  var strat = document.getElementById('ytdStrategy').value;
  var size = document.getElementById('ytdSize').value;
  var countEl = document.getElementById('ytdCount');

  var filtered = DATA.funds.filter(function(f){
    if (strat !== 'all' && f.strategy !== strat) return false;
    if (size !== 'all' && f.size !== size) return false;
    return true;
  });

  // Compute YTD: latest non-null NAV - 1.0
  var rows = filtered.map(function(f){
    var valid = f.navs.filter(function(n){ return n !== null; });
    var latest = valid.length ? valid[valid.length-1] : null;
    var first = valid.length ? valid[0] : null;
    var ytd = latest !== null ? latest - 1.0 : null;
    return { company: f.company, strategy: f.strategy, size: f.size, nav: latest, ytd: ytd, weeks: valid.length, first: first };
  }).filter(function(r){ return r.ytd !== null; })
    .sort(function(a,b){ return b.ytd - a.ytd; });

  var n = rows.length;
  rows.forEach(function(r, i){ r.pct = n > 1 ? Math.round((n-i)/n*100) : 100; });

  countEl.textContent = n + ' 条';

  // Bar scaling
  var maxAbs = 0;
  rows.forEach(function(r){ maxAbs = Math.max(maxAbs, Math.abs(r.ytd)); });

  var thead = '<tr><th>排名</th><th>管理人</th><th>策略</th><th>规模</th><th>累计净值</th><th>YTD收益</th><th>收益柱</th><th>分位</th><th>覆盖</th></tr>';
  document.querySelector('#tableYTD thead').innerHTML = thead;

  var tbody = '';
  rows.forEach(function(r, i){
    var ytdPct = (r.ytd * 100).toFixed(2);
    var isUp = r.ytd >= 0;
    var cls = isUp ? 'nav-up' : 'nav-down';
    var barW = maxAbs > 0 ? Math.abs(r.ytd) / maxAbs * 100 : 0;
    var barColor = isUp ? '#e74c3c' : '#27ae60';
    var barHtml = '<span style="display:inline-block;width:'+barW+'%;height:12px;background:'+barColor+';border-radius:3px;vertical-align:middle;"></span>';

    tbody += '<tr>';
    tbody += '<td><b>'+(i+1)+'</b></td>';
    tbody += '<td>'+r.company+'</td>';
    tbody += '<td>'+r.strategy+'</td>';
    tbody += '<td>'+r.size+'</td>';
    tbody += '<td class="'+cls+'">'+r.nav.toFixed(4)+'</td>';
    tbody += '<td class="'+cls+'">'+(isUp?'+':'')+ytdPct+'%</td>';
    tbody += '<td style="width:180px;">'+barHtml+'</td>';
    tbody += '<td>'+r.pct+'%</td>';
    tbody += '<td>'+r.weeks+'/'+dates.length+'</td>';
    tbody += '</tr>';
  });

  document.querySelector('#tableYTD tbody').innerHTML = tbody;
}

// ──

// Init all
updateGridSizes();
updateFundPicker();
updateRankTable();
updateWRTable();
updateYTDTable();
